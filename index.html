<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
    }
    .calc {
      background: #16213e;
      border-radius: 16px;
      padding: 24px;
      width: 320px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .display {
      background: #0f3460;
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 20px;
      text-align: right;
    }
    .display .expr {
      font-size: 13px;
      color: #a0aec0;
      min-height: 18px;
      margin-bottom: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .display .result {
      font-size: 36px;
      font-weight: 300;
      color: #e2e8f0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    button {
      padding: 18px 0;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.1s;
      font-weight: 400;
    }
    button:active { transform: scale(0.94); opacity: 0.8; }
    .btn-num    { background: #1a1a2e; color: #e2e8f0; }
    .btn-op     { background: #0f3460; color: #63b3ed; }
    .btn-eq     { background: #e94560; color: #fff; font-size: 22px; }
    .btn-clear  { background: #2d3748; color: #fc8181; }
    .btn-fn     { background: #2d3748; color: #a0aec0; font-size: 15px; }
    .span2      { grid-column: span 2; }
  </style>
</head>
<body>
<div class="calc">
  <div class="display">
    <div class="expr" id="expr"></div>
    <div class="result" id="result">0</div>
  </div>
  <div class="buttons">
    <button class="btn-clear btn-fn" onclick="clearAll()">AC</button>
    <button class="btn-fn"          onclick="toggleSign()">+/-</button>
    <button class="btn-fn"          onclick="percent()">%</button>
    <button class="btn-op"          onclick="setOp('/')">Ă·</button>

    <button class="btn-num" onclick="input('7')">7</button>
    <button class="btn-num" onclick="input('8')">8</button>
    <button class="btn-num" onclick="input('9')">9</button>
    <button class="btn-op"  onclick="setOp('*')">Ă—</button>

    <button class="btn-num" onclick="input('4')">4</button>
    <button class="btn-num" onclick="input('5')">5</button>
    <button class="btn-num" onclick="input('6')">6</button>
    <button class="btn-op"  onclick="setOp('-')">âˆ’</button>

    <button class="btn-num" onclick="input('1')">1</button>
    <button class="btn-num" onclick="input('2')">2</button>
    <button class="btn-num" onclick="input('3')">3</button>
    <button class="btn-op"  onclick="setOp('+')">+</button>

    <button class="btn-num span2" onclick="input('0')">0</button>
    <button class="btn-num"       onclick="dot()">.</button>
    <button class="btn-eq"        onclick="calculate()">=</button>
  </div>
</div>
<script>
  let cur = '0', prev = '', op = null, fresh = false;

  const R = document.getElementById('result');
  const E = document.getElementById('expr');

  function render() { R.textContent = cur; }

  function input(d) {
    if (fresh) { cur = d; fresh = false; }
    else cur = cur === '0' ? d : cur + d;
    render();
  }

  function dot() {
    if (fresh) { cur = '0.'; fresh = false; render(); return; }
    if (!cur.includes('.')) { cur += '.'; render(); }
  }

  function setOp(o) {
    if (op && !fresh) calculate(true);
    prev = cur; op = o; fresh = true;
    E.textContent = prev + ' ' + ({'+':'+','-':'âˆ’','*':'Ă—','/':'Ă·'}[o]);
  }

  function calculate(chain) {
    if (!op || !prev) return;
    const a = parseFloat(prev), b = parseFloat(cur);
    let r;
    if (op === '+') r = a + b;
    else if (op === '-') r = a - b;
    else if (op === '*') r = a * b;
    else if (op === '/') r = b === 0 ? 'Error' : a / b;
    if (!chain) { E.textContent = prev + ' ' + ({'+':'+','-':'âˆ’','*':'Ă—','/':'Ă·'}[op]) + ' ' + cur + ' ='; op = null; }
    cur = r === 'Error' ? 'Error' : parseFloat(r.toFixed(10)).toString();
    fresh = true; render();
  }

  function clearAll() { cur = '0'; prev = ''; op = null; fresh = false; E.textContent = ''; render(); }
  function toggleSign() { if (cur !== '0' && cur !== 'Error') { cur = cur.startsWith('-') ? cur.slice(1) : '-' + cur; render(); } }
  function percent() { if (cur !== 'Error') { cur = (parseFloat(cur) / 100).toString(); render(); } }
</script>
</body>
</html>
